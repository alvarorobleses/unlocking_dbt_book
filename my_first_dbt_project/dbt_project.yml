name: 'my_first_dbt_project'
version: '1.0.0'
config-version: 2

# Profile utilizado por dbt
profile: 'my_first_dbt_project'

# Directorios del proyecto
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

# Directorio donde dbt almacena archivos compilados
target-path: "target"

# Directorios eliminados por dbt clean
clean-targets:
  - "target"
  - "dbt_packages"

models:
  my_first_dbt_project:
    staging:
      +schema: staging

      crm:
        +schema: staging

      furniture_mart:
        +schema: staging

    intermediate:
      +schema: staging

      finance:
      operations:

    marts:
      finance:
        +schema: finance

      operations:
        +schema: operations

seeds:

snapshots: